<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings - Ayodhya Ramnagari Tourism</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🏛️ Ayodhya Ramnagari Tourism</h1>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="bookings.html">Bookings</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Bookings Section -->
    <section class="bookings-section">
        <div class="container">
            <h1>Book Your Tour</h1>
            <div class="booking-form-container">
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="destination">Destination:</label>
                        <select id="destination" name="destination" required>
                            <option value="">Select a destination</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="service_type">Service Type:</label>
                        <select id="service_type" name="service_type" required>
                            <option value="">Select service type</option>
                            <option value="hotel">Hotel</option>
                            <option value="tour">Guided Tour</option>
                            <option value="transportation">Transportation</option>
                            <option value="package">Package</option>
                            <option value="restaurant">Restaurant</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="check_in">Check-in Date:</label>
                        <input type="date" id="check_in" name="check_in" required>
                    </div>
                    <div class="form-group">
                        <label for="check_out">Check-out Date:</label>
                        <input type="date" id="check_out" name="check_out" required>
                    </div>
                    <div class="form-group">
                        <label for="people">Number of People:</label>
                        <input type="number" id="people" name="people" min="1" value="1" required>
                    </div>
                    <button type="submit" class="btn-primary">Book Now</button>
                </form>
                <div id="bookingMessage"></div>
            </div>

            <h2>Your Bookings</h2>
            <div id="userBookings" class="bookings-list">
                <!-- User bookings will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>Contact Us</h4>
                    <p>📞 Phone: 7607745628</p>
                    <p>💬 WhatsApp: 7607745628</p>
                </div>
            </div>
            <hr>
            <p class="footer-bottom">&copy; 2024 Ayodhya Ramnagari Tourism. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/bookings.js"></script>
</body>
</html>
