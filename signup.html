<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Ayodhya Ramnagari Tourism</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🏛️ Ayodhya Ramnagari Tourism</h1>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="bookings.html">Bookings</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Sign Up Form -->
    <section class="auth-section">
        <div class="auth-container">
            <h2>Sign Up</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
                <p>Already have an account? <a href="login.html">Login Here</a></p>
            </form>
            <div id="signupMessage"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>Contact Us</h4>
                    <p>📞 Phone: 7607745628</p>
                    <p>💬 WhatsApp: 7607745628</p>
                </div>
            </div>
            <hr>
            <p class="footer-bottom">&copy; 2024 Ayodhya Ramnagari Tourism. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/auth.js"></script>
</body>
</html>
